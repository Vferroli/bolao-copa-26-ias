name: Check API-Football (temporário)

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Testa cobertura da Copa (não imprime a chave)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          node --input-type=module -e '
            const KEY = process.env.API_FOOTBALL_KEY || "";
            console.log("chave presente:", KEY ? "sim ("+KEY.length+" chars)" : "NÃO");
            const base = "https://v3.football.api-sports.io";
            const h = { "x-apisports-key": KEY };
            const hoje = new Date().toISOString().slice(0,10);
            async function call(url){
              const r = await fetch(url, { headers: h });
              const rem = r.headers.get("x-ratelimit-requests-remaining");
              const remMin = r.headers.get("X-RateLimit-Remaining");
              const d = await r.json();
              return { status: r.status, rem, remMin, errors: d.errors, results: d.results, resp: d.response || [] };
            }
            // 1) jogos da Copa hoje
            const a = await call(`${base}/fixtures?league=1&season=2026&date=${hoje}`);
            console.log("\n[hoje league=1 season=2026]", "http", a.status, "| restante dia:", a.rem, "| min:", a.remMin);
            console.log("errors:", JSON.stringify(a.errors));
            console.log("results:", a.results);
            a.resp.slice(0,8).forEach(f => console.log("  ", f.fixture.status.short.padEnd(4), f.teams.home.name, (f.goals.home??"-")+"-"+(f.goals.away??"-"), f.teams.away.name, "| min:", f.fixture.status.elapsed));
            // 2) ao vivo só Copa
            const b = await call(`${base}/fixtures?live=all`);
            const wc = (b.resp||[]).filter(f => String(f.league?.id)==="1");
            console.log("\n[live=all] http", b.status, "| restante dia:", b.rem, "| total live global:", b.results, "| live Copa:", wc.length);
            wc.slice(0,8).forEach(f => console.log("  ", f.fixture.status.short, f.teams.home.name, f.goals.home+"-"+f.goals.away, f.teams.away.name, "min", f.fixture.status.elapsed));
          '
