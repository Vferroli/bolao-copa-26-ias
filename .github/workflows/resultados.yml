name: Atualizar resultados

on:
  schedule:
    - cron: "*/5 * * * *"   # backup (schedule do GitHub é best-effort/instável)
  workflow_dispatch: {}      # disparo manual e auto-corrente (ver abaixo)

permissions:
  contents: write
  actions: write

# serializa: runs não se cancelam (a corrente re-dispara no fim de cada run).
# GitHub mantém só 1 pendente por grupo -> sem pilha, sem storm.
concurrency:
  group: resultados
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Repo público = Actions grátis. Cada run faz auto-poll por ~50min (a cada 30s)
      # -> ao vivo com granularidade ~30s (7 chaves Highlightly dão orçamento). O live
      # vai pro Supabase (push Realtime, sem cache) E pro dados.json (commit [skip ci],
      # fallback durável). O script só chama a API quando há jogo na janela.
      - name: Auto-poll de placares (~50 min)
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_KEY_2: ${{ secrets.API_FOOTBALL_KEY_2 }}
          API_FOOTBALL_KEY_3: ${{ secrets.API_FOOTBALL_KEY_3 }}
          HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
          HIGHLIGHTLY_KEY_2: ${{ secrets.HIGHLIGHTLY_KEY_2 }}
          HIGHLIGHTLY_KEY_3: ${{ secrets.HIGHLIGHTLY_KEY_3 }}
          HIGHLIGHTLY_KEY_4: ${{ secrets.HIGHLIGHTLY_KEY_4 }}
          HIGHLIGHTLY_KEY_5: ${{ secrets.HIGHLIGHTLY_KEY_5 }}
          HIGHLIGHTLY_KEY_6: ${{ secrets.HIGHLIGHTLY_KEY_6 }}
          HIGHLIGHTLY_KEY_7: ${{ secrets.HIGHLIGHTLY_KEY_7 }}
          SUPABASE_SERVICE_KEY_BOLAO: ${{ secrets.SUPABASE_SERVICE_KEY_BOLAO }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fim=$((SECONDS + 3000))
          while [ $SECONDS -lt $fim ]; do
            # Sincroniza DURO com origin/main no início de cada ciclo. O script
            # recomputa todo o estado das APIs + main atual, então descartar o
            # working tree local é seguro e ELIMINA o conflito de rebase que
            # corrompia dados.json (marcadores de conflito -> crash no JSON.parse).
            git fetch -q origin main && git reset -q --hard origin/main
            node scripts/update-resultados.mjs || true
            if [ -n "$(git status --porcelain dados.json)" ]; then
              git add dados.json
              git commit -m "chore: atualiza resultados (auto) [skip ci]"
              # sem rebase: se o push for rejeitado (outro run pushou), o reset
              # do próximo ciclo pega o commit alheio e o script recomputa.
              git push || echo "push rejeitado (reset --hard no próximo ciclo)"
            fi
            sleep 30
          done

      # Auto-corrente: re-dispara o próprio workflow para rodar de forma contínua
      # sem depender do schedule do GitHub. Só em SUCESSO (run cancelado não
      # re-dispara -> sem storm). Requer secret DISPATCH_PAT (fine-grained,
      # Actions: read+write). Sem o PAT, cai no schedule/manual. Para após a Copa.
      - name: Re-dispara (corrente contínua)
        if: ${{ success() }}
        env:
          PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          hoje=$(date -u +%Y-%m-%d)
          if [ "$hoje" \> "2026-07-20" ]; then
            echo "Copa encerrada ($hoje) — corrente desligada."
            exit 0
          fi
          if [ -n "$PAT" ]; then
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/resultados.yml/dispatches" \
              -d '{"ref":"main"}' && echo "re-dispatch ok" || echo "re-dispatch falhou"
          else
            echo "Sem DISPATCH_PAT — sem corrente; depende de schedule/manual."
          fi
