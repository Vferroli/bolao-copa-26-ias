name: Atualizar resultados

on:
  schedule:
    - cron: "*/5 * * * *"   # backup (schedule do GitHub é best-effort/instável)
  workflow_dispatch: {}      # disparo manual e auto-corrente (ver abaixo)

permissions:
  contents: write
  actions: write

# novo run substitui o loop anterior -> cobertura contínua sem empilhar
concurrency:
  group: resultados
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Repo público = Actions grátis. Cada run faz auto-poll por ~50min (a cada 55s)
      # -> ao vivo com granularidade ~1min. Commits levam [skip ci] (não deploya;
      # site lê dados via raw/CDN). O script só chama a API quando há jogo na janela.
      - name: Auto-poll de placares (~50 min)
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fim=$((SECONDS + 3000))
          while [ $SECONDS -lt $fim ]; do
            node scripts/update-resultados.mjs || true
            if [ -n "$(git status --porcelain dados.json)" ]; then
              git add dados.json
              git commit -m "chore: atualiza resultados (auto) [skip ci]"
              git pull --rebase --autostash origin main || true
              git push || echo "push falhou (tenta no próximo ciclo)"
            fi
            sleep 55
          done

      # Auto-corrente: re-dispara o próprio workflow para rodar de forma contínua
      # sem depender do schedule do GitHub. Requer secret DISPATCH_PAT (fine-grained,
      # Actions: read+write neste repo). Sem o PAT, cai no schedule/manual.
      - name: Re-dispara (corrente contínua)
        if: ${{ always() }}
        env:
          PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          if [ -n "$PAT" ]; then
            curl -sf -X POST \
              -H "Authorization: Bearer $PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/resultados.yml/dispatches" \
              -d '{"ref":"main"}' && echo "re-dispatch ok" || echo "re-dispatch falhou"
          else
            echo "Sem DISPATCH_PAT — sem corrente; depende de schedule/manual."
          fi
