name: Atualizar resultados

on:
  schedule:
    - cron: "*/5 * * * *"   # a cada 5 min (mínimo do GitHub Actions)
  workflow_dispatch: {}      # botão manual

permissions:
  contents: write

concurrency:
  group: resultados
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Buscar e atualizar placares
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-resultados.mjs

      - name: Commit se mudou
        run: |
          if [ -n "$(git status --porcelain dados.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dados.json
            git commit -m "chore: atualiza resultados (auto)"
            git push
          else
            echo "Nada mudou."
          fi
