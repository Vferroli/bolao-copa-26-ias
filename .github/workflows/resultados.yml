name: Atualizar resultados

on:
  schedule:
    - cron: "*/5 * * * *"   # tenta a cada 5 min (cron do GitHub é best-effort)
  workflow_dispatch: {}      # botão manual

permissions:
  contents: write

# novo tick substitui o loop em andamento -> cobertura contínua sem empilhar runs
concurrency:
  group: resultados
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Repo público = minutos de Actions grátis. Cada run faz auto-poll por ~10min
      # (a cada 55s) -> ao vivo com granularidade de ~1min, resiliente a tick pulado.
      # O script só chama a API quando há jogo na janela; fora disso é no-op barato.
      - name: Auto-poll de placares (~10 min)
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fim=$((SECONDS + 600))
          while [ $SECONDS -lt $fim ]; do
            node scripts/update-resultados.mjs || true
            if [ -n "$(git status --porcelain dados.json)" ]; then
              git add dados.json
              git commit -m "chore: atualiza resultados (auto)"
              git pull --rebase --autostash origin main || true
              git push || echo "push falhou (tenta no próximo ciclo)"
            fi
            sleep 55
          done
