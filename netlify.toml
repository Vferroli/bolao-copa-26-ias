# Publicação no Netlify — site estático servido da raiz do repositório.
# Não há etapa de build: o painel é HTML + CSS + JS puro.

[build]
  publish = "."
  command = ""
  # Deploya SÓ quando index.html ou assets/** mudam. Dados (CDN), workflow,
  # scripts e .md não geram deploy. Netlify cobra ~15 créditos/deploy.
  # exit 0 (sem mudança no site) = pula build; não-0 = builda (fail-safe em erro).
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- index.html assets"

# Não cachear o dados.json: assim o painel sempre pega o placar mais recente.
[[headers]]
  for = "/dados.json"
  [headers.values]
    Cache-Control = "no-cache"
